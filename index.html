<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Mai Xuân Hiếu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-card">
        <h1 id="loi-chao">Chào thế giới! Tôi là Mai Xuân Hiếu</h1>
        <h2>Mục tiêu: Trở thành Dev mà thị trường săn đón.</h2>
        <img src="https://static.vecteezy.com/system/resources/thumbnails/027/951/137/small/stylish-spectacles-guy-3d-avatar-character-illustrations-png.png" alt="Ảnh đại diện của Hiếu" width="200">
        <p>Tôi đang trên con đường trở thành Full-Stack Developer thực chiến dưới sự hướng dẫn của AI.</p>

        <div id="danh-sach-ky-nang" class="skills" aria-label="Danh sách kỹ năng"></div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="thayDoiTen()">Đổi tên của bạn</button>
            <button class="btn btn-secondary" onclick="doiGiaoDien()">Sáng / Tối</button>
        </div>
        <div class="stats-container">
            <div class="stat-item">
                <h3>5+</h3>
                <p>Dự án</p>
            </div>
            <div class="stat-item">
                <h3>1,000+</h3>
                <p>Dòng code</p>
            </div>
            <div class="stat-item">
                <h3>99+</h3>
                <p>Bugs Fixed</p>
            </div>
        </div>
        <a href="https://aistudio.google.com/" target="_blank" rel="noopener noreferrer">Xem dự án AI</a>
    </div>
    <script>
       // Khai báo một Hàm (Function)
        function thayDoiTen() {
            // Code bên trong hàm sẽ chỉ chạy khi hàm này bị gọi
            let tenKhach = prompt("Xin chào! Khách quý tên là gì thế?");
            
            if (tenKhach) {
                document.getElementById("loi-chao").innerText = "Chào " + tenKhach + "! Tôi là Mai Xuân Hiếu";
            }
        }

        function doiGiaoDien() {
            document.body.classList.toggle("light-theme");
        }

        // --- Render danh sách kỹ năng động (dữ liệu mô phỏng từ API) ---
        (function renderSkills() {
            // Dữ liệu mô phỏng lấy từ API / Database
            const danhSachKyNang = [
                { ten: "HTML5", capDo: "Pro" },
                { ten: "CSS3", capDo: "Mid" },
                { ten: "JavaScript", capDo: "Junior" },
                { ten: "ReactJS", capDo: "Learning" }
            ];

            const khungChua = document.getElementById("danh-sach-ky-nang");

            if (!khungChua) return;

            danhSachKyNang.forEach(function(kyNang) {
                const span = document.createElement('span');
                span.className = 'skill-badge';

                // Lấy thuộc tính 'ten' và 'capDo' từ object
                span.textContent = `${kyNang.ten} (${kyNang.capDo})`;

                khungChua.appendChild(span);
            });
        })();
    </script>
</body>
</html>
